name: Cross-Platform Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure scripts are executable
        run: |
          chmod +x tests/test_platform_helpers.sh
          chmod +x lib/platform_helpers
          chmod +x install.sh
          for f in skills/*/bin/*; do
            [ -f "$f" ] && chmod +x "$f"
          done

      - name: Run platform_helpers test suite
        run: bash tests/test_platform_helpers.sh

      - name: Test install.sh --help
        run: |
          # install.sh is interactive, but --help should work
          bash install.sh --help 2>&1 || true

      - name: Test platform_helpers sourcing from different paths
        run: |
          # Simulate sourcing from skill bin directory (relative path)
          cd skills/long-running-task/bin
          bash -c 'source ../../../lib/platform_helpers && get_platform && get_total_memory_mb'

      - name: Verify no bash 3.2 incompatibilities
        run: |
          FOUND=0

          # Check for ${var,,} pattern which fails on bash 3.2 (macOS default)
          if grep -rn '\${[a-zA-Z_]*,,}' lib/ skills/ install.sh 2>/dev/null; then
            echo 'FAIL: Found bash 4+ only ${var,,} syntax'
            FOUND=1
          else
            echo 'PASS: No ${var,,} patterns found'
          fi

          # Check for ${var^^} pattern
          if grep -rn '\${[a-zA-Z_]*\^\^}' lib/ skills/ install.sh 2>/dev/null; then
            echo 'FAIL: Found bash 4+ only ${var^^} syntax'
            FOUND=1
          else
            echo 'PASS: No ${var^^} patterns found'
          fi

          # Check for associative arrays (declare -A)
          if grep -rn 'declare -A' lib/ skills/ install.sh 2>/dev/null; then
            echo 'FAIL: Found bash 4+ only associative arrays'
            FOUND=1
          else
            echo 'PASS: No associative arrays found'
          fi

          exit $FOUND

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: ShellCheck lib/platform_helpers
        run: shellcheck -s bash -S warning lib/platform_helpers

      - name: ShellCheck skill bin scripts
        run: |
          EXIT=0
          for f in skills/*/bin/*; do
            [ -f "$f" ] || continue
            echo "Checking $f..."
            # SC1091: sourced file not found (expected since lib path varies)
            # SC2034: unused variable (some vars are used by callers)
            # SC1090: can't follow dynamic source (expected for platform_helpers)
            if ! shellcheck -s bash -S warning -e SC1091,SC2034,SC1090 "$f"; then
              EXIT=1
            fi
          done
          exit $EXIT

      - name: ShellCheck test scripts
        run: shellcheck -s bash -S warning -e SC1091,SC1090 tests/test_platform_helpers.sh
